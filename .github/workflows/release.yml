name: Release CLI

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate release tag
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match x.y.z. Got: ${TAG}"
            exit 1
          fi

          printf 'VERSION=%s\n' "$TAG" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install tooling
        run: make tools

      - name: Self-test docs validators
        run: python3 scripts/test_check_docs.py

      - name: Check release docs updated
        run: make check-release-docs VERSION="${VERSION}"

      - name: Run release guardrails
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make format-check
          make check-docs
          make check-wall-of-apps
          make lint
          ASC_BYPASS_KEYCHAIN=1 make test

      - name: Create release directory
        run: mkdir -p release

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}

      - name: Build for macOS
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_macOS_amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_macOS_arm64 .

      - name: Code sign macOS binaries
        if: env.APPLE_DEVELOPER_ID != ''
        run: |
          for binary in release/asc_*_macOS_*; do
            codesign --force --sign "${{ secrets.APPLE_DEVELOPER_ID }}" --timestamp --options=runtime "$binary"
          done
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}

      - name: Build for Linux
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_linux_arm64 .

      - name: Build for Windows
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_windows_amd64.exe .

      - name: Create checksums
        run: |
          cd release
          shasum -a 256 * > asc_${VERSION}_checksums.txt

      - name: Display files
        run: ls -la release/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" release/* --clobber
          else
            gh release create "${VERSION}" release/* --generate-notes --verify-tag
          fi

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "::error::TAP_GITHUB_TOKEN not set"
            exit 1
          fi

          export SHA256_AMD64=$(shasum -a 256 release/asc_${VERSION}_macOS_amd64 | cut -d ' ' -f 1)
          export SHA256=$(shasum -a 256 release/asc_${VERSION}_macOS_arm64 | cut -d ' ' -f 1)

          # Clone the tap repo
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/rorkai/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          # Update the formula
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          version = os.environ["VERSION"]
          sha256_arm64 = os.environ["SHA256"]
          sha256_amd64 = os.environ["SHA256_AMD64"]
          formula = dedent(
              f"""\
              # typed: false
              # frozen_string_literal: true

              class Asc < Formula
                desc "A fast, AI-agent friendly CLI for App Store Connect"
                homepage 'https://github.com/rorkai/App-Store-Connect-CLI'
                version '{version}'
                license 'MIT'

                depends_on :macos

                on_macos do
                  if Hardware::CPU.arm?
                    url 'https://github.com/rorkai/App-Store-Connect-CLI/releases/download/{version}/asc_{version}_macOS_arm64'
                    sha256 '{sha256_arm64}'
                  else
                    url 'https://github.com/rorkai/App-Store-Connect-CLI/releases/download/{version}/asc_{version}_macOS_amd64'
                    sha256 '{sha256_amd64}'
                  end
                end

                def install
                  if Hardware::CPU.arm?
                    bin.install 'asc_{version}_macOS_arm64' => 'asc'
                  else
                    bin.install 'asc_{version}_macOS_amd64' => 'asc'
                  end
                end

                test do
                  assert_match "asc is a fast, lightweight CLI for App Store Connect", shell_output("#{{bin}}/asc --help")
                end
              end
              """
          )
          Path("Formula/asc.rb").write_text(formula, encoding="utf-8")
          PY

          # Commit and push
          git config user.name "Rudrank Riyam"
          git config user.email "rudrankriyam@gmail.com"
          git add Formula/asc.rb
          git commit -m "Update asc to ${VERSION}" || echo "No changes to commit"
          git push

      - name: Generate WinGet manifests
        run: |
          python3 scripts/generate_winget_manifests.py \
            --version "${VERSION}" \
            --release-dir release \
            --output-dir release/winget

      - name: Upload WinGet manifests artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: winget-manifests-${{ env.VERSION }}
          path: release/winget/manifests/r/Rorkai/ASC/${{ env.VERSION }}

      - name: Submit WinGet package PR
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          WINGET_FORK_OWNER: ${{ vars.WINGET_FORK_OWNER }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::WINGET_GITHUB_TOKEN not set; create a token that can fork/push to winget-pkgs and open PRs"
            exit 1
          fi

          AUTH_LOGIN="$(gh api user --jq .login)"
          if [ -z "$WINGET_FORK_OWNER" ]; then
            WINGET_FORK_OWNER="${AUTH_LOGIN}"
          fi

          BRANCH="rorkai-asc-${VERSION}"
          MANIFEST_SOURCE="${PWD}/release/winget/manifests/r/Rorkai/ASC/${VERSION}"

          if ! gh repo view "${WINGET_FORK_OWNER}/winget-pkgs" >/dev/null 2>&1; then
            if [ "${WINGET_FORK_OWNER}" = "${AUTH_LOGIN}" ]; then
              gh repo fork microsoft/winget-pkgs --clone=false
            else
              gh repo fork microsoft/winget-pkgs --org "${WINGET_FORK_OWNER}" --clone=false
            fi
          fi

          git clone --filter=blob:none --sparse "https://x-access-token:${GH_TOKEN}@github.com/${WINGET_FORK_OWNER}/winget-pkgs.git" winget-pkgs
          cd winget-pkgs
          git remote add upstream https://github.com/microsoft/winget-pkgs.git
          git fetch upstream master --depth 1
          git fetch origin "${BRANCH}:refs/remotes/origin/${BRANCH}" --depth 1 || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}" upstream/master
          fi
          git sparse-checkout set "manifests/r/Rorkai/ASC"

          PR_KIND="New package"
          if [ -d manifests/r/Rorkai/ASC ] && find manifests/r/Rorkai/ASC -mindepth 1 -maxdepth 1 -type d | grep -q .; then
            PR_KIND="New version"
          fi
          OPEN_PACKAGE_PRS="$(gh pr list --repo microsoft/winget-pkgs --state open --search "Rorkai.ASC in:title" --json headRefName --jq "[.[] | select(.headRefName != \"${BRANCH}\")] | length" || echo "0")"
          if [ "${PR_KIND}" = "New package" ] && [ "${OPEN_PACKAGE_PRS}" != "0" ]; then
            PR_KIND="New version"
          fi

          mkdir -p "manifests/r/Rorkai/ASC/${VERSION}"
          cp "${MANIFEST_SOURCE}"/* "manifests/r/Rorkai/ASC/${VERSION}/"

          git config user.name "Rorkai Release Bot"
          git config user.email "release-bot@rork.com"
          git add "manifests/r/Rorkai/ASC/${VERSION}"
          if git diff --cached --quiet; then
            echo "WinGet manifests for ${VERSION} are already published or up to date."
            exit 0
          fi

          git commit -m "${PR_KIND}: Rorkai.ASC version ${VERSION}"
          git push --force-with-lease origin "${BRANCH}"

          if gh pr list --repo microsoft/winget-pkgs --state open --search "Rorkai.ASC version ${VERSION} in:title" --json number --jq '.[0].number // empty' | grep -q .; then
            echo "WinGet PR already exists for Rorkai.ASC ${VERSION}."
          elif gh pr list --repo microsoft/winget-pkgs --head "${WINGET_FORK_OWNER}:${BRANCH}" --json number --jq '.[0].number // empty' | grep -q .; then
            echo "WinGet PR already exists for ${VERSION}."
          else
            gh pr create \
              --repo microsoft/winget-pkgs \
              --base master \
              --head "${WINGET_FORK_OWNER}:${BRANCH}" \
              --title "${PR_KIND}: Rorkai.ASC version ${VERSION}" \
              --body "Adds Rorkai.ASC ${VERSION} from https://github.com/rorkai/App-Store-Connect-CLI/releases/tag/${VERSION}."
          fi
